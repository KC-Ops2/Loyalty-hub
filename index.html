<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyalty Hub</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 16px;
        }

        #app {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 32px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: #888;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #444;
        }

        .btn-secondary:hover {
            background: #333;
            border-color: #555;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .card {
            aspect-ratio: 0.65;
            background: linear-gradient(135deg, #1f1f1f, #2a2a2a);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00d4ff, #0099ff, #ff006e);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            border-color: #00d4ff;
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.15);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #e0e0e0;
            margin-top: 8px;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }

        .card-actions button {
            padding: 6px 12px;
            font-size: 0.75rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s ease;
        }

        .btn-view {
            background: #00d4ff;
            color: #000;
            font-weight: 600;
        }

        .btn-view:hover {
            background: #00b8d4;
        }

        .btn-delete {
            background: #2a2a2a;
            color: #ff4757;
            border: 1px solid #444;
        }

        .btn-delete:hover {
            background: #3a2a2a;
            border-color: #ff4757;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #666;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #888;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-out;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.3s ease-out;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .modal-close:hover {
            color: #e0e0e0;
        }

        .barcode-display {
            text-align: center;
            margin-bottom: 24px;
        }

        .barcode-display h2 {
            font-size: 1.3rem;
            margin-bottom: 16px;
            color: #e0e0e0;
        }

        .barcode-container {
            background: #fff;
            padding: 16px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 16px;
        }

        svg, canvas {
            max-width: 100%;
            height: auto;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #e0e0e0;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.9rem;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .form-actions button {
            flex: 1;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }

            .modal-content {
                padding: 24px;
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPERMARKETS = [
            { id: 'tesco', name: 'Tesco', logo: '🛒', color: '#0052cc' },
            { id: 'sainsburys', name: 'Sainsbury\'s', logo: '🏪', color: '#ff6600' },
            { id: 'asda', name: 'ASDA', logo: '🏬', color: '#003da5' },
            { id: 'morrisons', name: 'Morrisons', logo: '🏪', color: '#ff1a1a' },
            { id: 'aldi', name: 'Aldi', logo: '🛍️', color: '#ffcc00' },
            { id: 'lidl', name: 'Lidl', logo: '🛒', color: '#1e40af' },
        ];

        const BarcodeViewer = ({ card, onClose }) => {
            useEffect(() => {
                // Generate barcode or QR code
                const container = document.getElementById('barcode-render');
                if (container) {
                    container.innerHTML = '';
                    
                    if (card.type === 'barcode' && card.value) {
                        try {
                            JsBarcode('#barcode-render', card.value, {
                                format: 'CODE128',
                                width: 2,
                                height: 100,
                                margin: 10,
                            });
                        } catch (e) {
                            container.textContent = 'Invalid barcode';
                        }
                    } else if (card.type === 'qr' && card.value) {
                        try {
                            QRCode.toCanvas(container, card.value, {
                                width: 300,
                                margin: 1,
                                color: {
                                    dark: '#000000',
                                    light: '#ffffff',
                                },
                            });
                        } catch (e) {
                            container.textContent = 'Invalid QR code';
                        }
                    }
                }
            }, [card]);

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <button className="modal-close" onClick={onClose}>✕</button>
                        <div className="barcode-display">
                            <h2>{card.name}</h2>
                            <div className="barcode-container">
                                <svg id="barcode-render" style={{ display: card.type === 'barcode' ? 'block' : 'none' }}></svg>
                                <canvas id="barcode-render" style={{ display: card.type === 'qr' ? 'block' : 'none' }}></canvas>
                            </div>
                            <p style={{ fontSize: '0.85rem', color: '#888', marginTop: '12px' }}>
                                {card.type === 'barcode' ? 'Scan the barcode at checkout' : 'Scan the QR code at checkout'}
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const AddCardForm = ({ onAdd, onCancel }) => {
            const [formData, setFormData] = useState({
                supermarket: 'tesco',
                type: 'barcode',
                value: '',
                customName: '',
            });

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.value.trim()) return;

                const supermarket = SUPERMARKETS.find(s => s.id === formData.supermarket);
                const cardName = formData.customName || supermarket.name;

                onAdd({
                    id: Date.now().toString(),
                    name: cardName,
                    supermarket: formData.supermarket,
                    type: formData.type,
                    value: formData.value,
                    logo: supermarket.logo,
                });

                setFormData({ supermarket: 'tesco', type: 'barcode', value: '', customName: '' });
            };

            return (
                <div className="modal-overlay" onClick={onCancel}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <button className="modal-close" onClick={onCancel}>✕</button>
                        <h2 style={{ marginBottom: '20px', color: '#e0e0e0' }}>Add Loyalty Card</h2>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Supermarket</label>
                                <select name="supermarket" value={formData.supermarket} onChange={handleChange}>
                                    {SUPERMARKETS.map(sm => (
                                        <option key={sm.id} value={sm.id}>{sm.name}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="form-group">
                                <label>Card Type</label>
                                <select name="type" value={formData.type} onChange={handleChange}>
                                    <option value="barcode">Barcode</option>
                                    <option value="qr">QR Code</option>
                                </select>
                            </div>

                            <div className="form-group">
                                <label>{formData.type === 'barcode' ? 'Barcode Number' : 'QR Code Data'}</label>
                                <input
                                    type="text"
                                    name="value"
                                    value={formData.value}
                                    onChange={handleChange}
                                    placeholder={formData.type === 'barcode' ? 'e.g., 1234567890123' : 'e.g., https://loyalty.app/user/123'}
                                    required
                                />
                            </div>

                            <div className="form-group">
                                <label>Custom Name (Optional)</label>
                                <input
                                    type="text"
                                    name="customName"
                                    value={formData.customName}
                                    onChange={handleChange}
                                    placeholder="Leave blank to use supermarket name"
                                />
                            </div>

                            <div className="form-actions">
                                <button type="button" className="btn btn-secondary" onClick={onCancel}>Cancel</button>
                                <button type="submit" className="btn btn-primary">Add Card</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const LoyaltyHub = () => {
            const [cards, setCards] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);
            const [selectedCard, setSelectedCard] = useState(null);

            // Load from localStorage on mount
            useEffect(() => {
                const saved = localStorage.getItem('loyalty-cards');
                if (saved) {
                    try {
                        setCards(JSON.parse(saved));
                    } catch (e) {
                        console.error('Failed to load cards:', e);
                    }
                }
            }, []);

            // Save to localStorage when cards change
            useEffect(() => {
                localStorage.setItem('loyalty-cards', JSON.stringify(cards));
            }, [cards]);

            const handleAddCard = (newCard) => {
                setCards(prev => [newCard, ...prev]);
                setShowAddForm(false);
            };

            const handleDeleteCard = (cardId) => {
                setCards(prev => prev.filter(c => c.id !== cardId));
            };

            const handleViewCard = (card) => {
                setSelectedCard(card);
            };

            return (
                <div>
                    <div className="header">
                        <h1>Loyalty Hub</h1>
                        <p>All your loyalty cards in one place</p>
                    </div>

                    <div className="controls">
                        <button className="btn btn-primary" onClick={() => setShowAddForm(true)}>
                            + Add Card
                        </button>
                    </div>

                    {cards.length === 0 ? (
                        <div className="empty-state">
                            <h2>No cards yet</h2>
                            <p>Add your first loyalty card to get started</p>
                        </div>
                    ) : (
                        <div className="grid">
                            {cards.map(card => {
                                const supermarket = SUPERMARKETS.find(s => s.id === card.supermarket);
                                return (
                                    <div key={card.id} className="card">
                                        <div>
                                            <div className="card-logo">{supermarket?.logo}</div>
                                            <div className="card-name">{card.name}</div>
                                        </div>
                                        <div className="card-actions">
                                            <button className="btn-view" onClick={() => handleViewCard(card)}>
                                                View
                                            </button>
                                            <button className="btn-delete" onClick={() => handleDeleteCard(card.id)}>
                                                Delete
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {showAddForm && <AddCardForm onAdd={handleAddCard} onCancel={() => setShowAddForm(false)} />}
                    {selectedCard && <BarcodeViewer card={selectedCard} onClose={() => setSelectedCard(null)} />}
                </div>
            );
        };

        ReactDOM.render(<LoyaltyHub />, document.getElementById('app'));
    </script>
</body>
</html>
